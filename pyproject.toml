[project]
name = "sphero-vem"
version = "0.1.0"
description = ""
authors = [
    {name = "dv-bt",email = "d.bottone@pm.me"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "torch (>=2.0.0,<2.7.0)",
    "torchvision (>=0.15.0,<0.22.0)",
    "careamics (>=0.0.9)",
    "opencv-python (>=4.11.0.86,<5.0.0.0)",
    "kornia (>=0.8.0,<0.9.0)",
    "ome-types (>=0.6.0,<0.7.0)",
    "h5py (>=3.13.0,<4.0.0)",
]

[tool.poetry]
packages = [{include = "sphero_vem", from = "src"}]


[tool.poetry.group.test.dependencies]
pytest = "^8.3.5"
pytest-cov = "^6.0.0"
black = "^25.1.0"
flake8 = "^7.1.2"
mypy = "^1.15.0"
isort = "^6.0.1"


[tool.poetry.group.notebook.dependencies]
pandas = "^2.2.3"
ipykernel = "^6.29.5"
ipympl = "^0.9.7"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
